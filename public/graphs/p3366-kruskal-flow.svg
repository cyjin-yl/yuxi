<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 310">
  <style>
    text { font-family: sans-serif; font-size: 10px; }
    .box { fill: #4caf50; stroke: #333; stroke-width: 1; rx: 4; }
    .proc { fill: #e3f2fd; stroke: #333; stroke-width: 1; rx: 16; }
    .dec { fill: #fff9c4; stroke: #333; stroke-width: 1; }
    .end { fill: #ff5722; stroke: #333; stroke-width: 1; rx: 4; }
    .arrow { stroke: #333; stroke-width: 1; fill: none; marker-end: url(#arrowhead); }
  </style>
  <defs><marker id="arrowhead" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto"><polygon points="0,0 6,2 0,4" fill="#333"/></marker></defs>
  <!-- Start -->
  <rect class="box" x="100" y="5" width="50" height="30"/>
  <text x="125" y="24" text-anchor="middle" fill="white">开始</text>
  <line class="arrow" x1="125" y1="35" x2="125" y2="55"/>
  <!-- Sort -->
  <rect class="proc" x="70" y="55" width="110" height="30"/>
  <text x="125" y="74" text-anchor="middle">边按权值排序</text>
  <line class="arrow" x1="125" y1="85" x2="125" y2="105"/>
  <!-- Init -->
  <rect class="proc" x="70" y="105" width="110" height="30"/>
  <text x="125" y="124" text-anchor="middle">并查集初始化</text>
  <line class="arrow" x1="125" y1="135" x2="125" y2="155"/>
  <!-- Process each edge -->
  <rect class="proc" x="60" y="155" width="130" height="30"/>
  <text x="125" y="174" text-anchor="middle">for 每条边 (u,v,w)</text>
  <line class="arrow" x1="125" y1="185" x2="125" y2="205"/>
  <!-- Decision -->
  <polygon class="dec" points="125,205 85,225 125,245 165,225"/>
  <text x="125" y="230" text-anchor="middle">find(u)=find(v)?</text>
  <!-- Yes: skip -->
  <line class="arrow" x1="165" y1="225" x2="210" y2="225"/>
  <text x="187" y="220" text-anchor="middle">是</text>
  <rect class="proc" x="210" y="210" width="40" height="30"/>
  <text x="230" y="229" text-anchor="middle">跳过</text>
  <!-- No: add edge -->
  <line class="arrow" x1="125" y1="245" x2="125" y2="265"/>
  <text x="130" y="256" text-anchor="start">否</text>
  <rect class="proc" x="60" y="265" width="130" height="30"/>
  <text x="125" y="279" text-anchor="middle">unite(u,v); ans+=w</text>
  <text x="125" y="293" text-anchor="middle">cnt++; 若 cnt=n-1 跳出</text>
</svg>
