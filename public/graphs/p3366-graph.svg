<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 180">
  <style>
    text { font-family: sans-serif; font-size: 11px; }
    .node { fill: #4caf50; stroke: #333; stroke-width: 1.5; }
    .edge { stroke: #555; stroke-width: 1.5; }
    .edge-label { fill: #333; font-size: 9px; }
  </style>
  <!-- Nodes -->
  <circle class="node" cx="60" cy="40" r="18"/><text x="60" y="45" text-anchor="middle" fill="white" font-size="13px">1</text>
  <circle class="node" cx="160" cy="40" r="18"/><text x="160" y="45" text-anchor="middle" fill="white" font-size="13px">2</text>
  <circle class="node" cx="60" cy="140" r="18"/><text x="60" y="145" text-anchor="middle" fill="white" font-size="13px">3</text>
  <circle class="node" cx="160" cy="140" r="18"/><text x="160" y="145" text-anchor="middle" fill="white" font-size="13px">4</text>
  <!-- Edges with weights -->
  <line class="edge" x1="76" y1="50" x2="144" y2="50"/>
  <text class="edge-label" x="110" y="46" text-anchor="middle">1</text>
  <line class="edge" x1="60" y1="58" x2="60" y2="122"/>
  <text class="edge-label" x="52" y="92" text-anchor="end">5</text>
  <line class="edge" x1="160" y1="58" x2="160" y2="122"/>
  <text class="edge-label" x="168" y="92" text-anchor="start">7</text>
  <line class="edge" x1="78" y1="138" x2="142" y2="142"/>
  <text class="edge-label" x="110" y="150" text-anchor="middle">6</text>
  <line class="edge" x1="78" y1="52" x2="142" y2="128"/>
  <text class="edge-label" x="118" y="86" text-anchor="start">9</text>
</svg>
