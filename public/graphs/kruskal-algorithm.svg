<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 340">
  <style>
    text { font-family: sans-serif; font-size: 10px; }
    .box { fill: #4caf50; stroke: #333; stroke-width: 1; rx: 4; }
    .proc { fill: #e3f2fd; stroke: #333; stroke-width: 1; rx: 16; }
    .dec { fill: #fff9c4; stroke: #333; stroke-width: 1; }
    .end { fill: #ff5722; stroke: #333; stroke-width: 1; rx: 4; }
    .arrow { stroke: #333; stroke-width: 1; fill: none; marker-end: url(#arrowhead); }
  </style>
  <defs><marker id="arrowhead" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto"><polygon points="0,0 6,2 0,4" fill="#333"/></marker></defs>
  <!-- Start -->
  <rect class="box" x="125" y="5" width="50" height="30"/>
  <text x="150" y="24" text-anchor="middle" fill="white">开始</text>
  <line class="arrow" x1="150" y1="35" x2="150" y2="60"/>
  <!-- Sort -->
  <rect class="proc" x="90" y="60" width="120" height="30"/>
  <text x="150" y="79" text-anchor="middle">边按权值排序</text>
  <line class="arrow" x1="150" y1="90" x2="150" y2="115"/>
  <!-- Init -->
  <rect class="proc" x="90" y="115" width="120" height="30"/>
  <text x="150" y="134" text-anchor="middle">并查集初始化</text>
  <line class="arrow" x1="150" y1="145" x2="150" y2="170"/>
  <!-- Loop -->
  <rect class="proc" x="75" y="170" width="150" height="30"/>
  <text x="150" y="189" text-anchor="middle">for 每条边 (u,v,w)</text>
  <line class="arrow" x1="150" y1="200" x2="150" y2="225"/>
  <!-- Decision -->
  <polygon class="dec" points="150,225 105,248 150,271 195,248"/>
  <text x="150" y="252" text-anchor="middle">find(u)≠find(v)?</text>
  <!-- Yes branch -->
  <line class="arrow" x1="105" y1="248" x2="55" y2="248"/>
  <text x="80" y="242" text-anchor="middle">是</text>
  <rect class="proc" x="5" y="230" width="100" height="36"/>
  <text x="55" y="244" text-anchor="middle">unite(u,v)</text>
  <text x="55" y="258" text-anchor="middle">ans += w</text>
  <line class="arrow" x1="105" y1="258" x2="105" y2="295"/>
  <!-- No branch -->
  <line class="arrow" x1="195" y1="248" x2="245" y2="248"/>
  <text x="220" y="242" text-anchor="middle">否</text>
  <rect class="proc" x="245" y="230" width="50" height="36"/>
  <text x="270" y="252" text-anchor="middle">跳过</text>
  <line class="arrow" x1="245" y1="258" x2="195" y2="258"/>
  <!-- End check -->
  <line class="arrow" x1="105" y1="295" x2="150" y2="295"/>
  <rect class="end" x="125" y="300" width="50" height="30"/>
  <text x="150" y="319" text-anchor="middle" fill="white">结束</text>
</svg>
