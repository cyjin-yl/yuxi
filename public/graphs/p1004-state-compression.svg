<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 320" width="560" height="320">
  <defs>
    <style>
      .box { fill: #e3f2fd; stroke: #1565c0; stroke-width: 2; rx: 6; }
      .box-green { fill: #e8f5e9; stroke: #2e7d32; stroke-width: 2; rx: 6; }
      .box-orange { fill: #fff3e0; stroke: #e65100; stroke-width: 2; rx: 6; }
      .title { font-size: 14px; font-family: sans-serif; fill: #333; }
      .label { font-size: 12px; font-family: monospace; fill: #444; text-anchor: middle; }
      .arrow-line { stroke: #666; stroke-width: 1.5; marker-end: url(#ah); }
    </style>
    <marker id="ah" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#666"/>
    </marker>
  </defs>

  <text x="280" y="22" class="title" text-anchor="middle">状态压缩：从 4 维到 3 维</text>

  <!-- 4D state -->
  <g transform="translate(40, 50)">
    <rect class="box" width="160" height="70"/>
    <text class="label" x="80" y="25">4 维状态</text>
    <text class="label" x="80" y="45" font-size="14">dp[x₁][y₁][x₂][y₂]</text>
    <text class="label" x="80" y="60" font-size="10" fill="#777">四条独立坐标</text>
  </g>

  <!-- Arrow -->
  <line class="arrow-line" x1="200" y1="85" x2="270" y2="85"/>

  <!-- Key insight box -->
  <g transform="translate(270, 50)">
    <rect class="box-orange" width="260" height="70"/>
    <text class="label" x="130" y="25" font-size="11">关键观察</text>
    <text class="label" x="130" y="45" font-size="13">x₁+y₁ = x₂+y₂ = k</text>
    <text class="label" x="130" y="60" font-size="10" fill="#777">两条路径走了相同步数</text>
  </g>

  <!-- Down arrow -->
  <line class="arrow-line" x1="400" y1="120" x2="400" y2="155"/>

  <!-- 3D state -->
  <g transform="translate(290, 155)">
    <rect class="box-green" width="200" height="70"/>
    <text class="label" x="100" y="25">3 维状态</text>
    <text class="label" x="100" y="45" font-size="14">dp[k][x₁][x₂]</text>
    <text class="label" x="100" y="60" font-size="10" fill="#777">y₁ = k−x₁, y₂ = k−x₂</text>
  </g>

  <!-- Explanation on left -->
  <g transform="translate(30, 155)">
    <rect class="box" width="220" height="120"/>
    <text class="label" x="110" y="22" font-size="12" fill="#1565c0">为什么 k 相同？</text>
    <text class="label" x="110" y="45" font-size="10">每条路径从 (1,1) 出发，</text>
    <text class="label" x="110" y="58" font-size="10">每次只向右或向下走一步</text>
    <text class="label" x="110" y="75" font-size="10">从 (1,1) 到 (x,y) 需要</text>
    <text class="label" x="110" y="88" font-size="10">恰好 (x−1)+(y−1) = x+y−2 步</text>
    <text class="label" x="110" y="105" font-size="10">所以步数 = x+y，即 k</text>
  </g>

  <!-- Bottom: complexity comparison -->
  <g transform="translate(30, 290)">
    <text class="label" x="20" y="0" font-size="10" fill="#777">4 维: O(n⁴) → 3 维: O(n³) （n≤9 时几乎无差别，但代码更简洁）</text>
  </g>
</svg>
