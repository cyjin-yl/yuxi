<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 350">
  <style>
    text { font-family: sans-serif; font-size: 10px; }
    .box { fill: #4caf50; stroke: #333; stroke-width: 1; rx: 4; }
    .proc { fill: #e3f2fd; stroke: #333; stroke-width: 1; rx: 16; }
    .dec { fill: #fff9c4; stroke: #333; stroke-width: 1; }
    .end { fill: #ff5722; stroke: #333; stroke-width: 1; rx: 4; }
    .arrow { stroke: #333; stroke-width: 1; fill: none; marker-end: url(#arrowhead); }
  </style>
  <defs><marker id="arrowhead" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto"><polygon points="0,0 6,2 0,4" fill="#333"/></marker></defs>
  <!-- Start -->
  <rect class="box" x="125" y="5" width="50" height="30"/>
  <text x="150" y="24" text-anchor="middle" fill="white">开始</text>
  <line class="arrow" x1="150" y1="35" x2="150" y2="60"/>
  <!-- Init dist -->
  <rect class="proc" x="75" y="60" width="150" height="30"/>
  <text x="150" y="79" text-anchor="middle">dist[1]=0, 其余=∞</text>
  <line class="arrow" x1="150" y1="90" x2="150" y2="115"/>
  <!-- PQ -->
  <rect class="proc" x="90" y="115" width="120" height="30"/>
  <text x="150" y="134" text-anchor="middle">priority_queue 插入(0,1)</text>
  <line class="arrow" x1="150" y1="145" x2="150" y2="170"/>
  <!-- Empty check -->
  <polygon class="dec" points="150,170 105,193 150,216 195,193"/>
  <text x="150" y="199" text-anchor="middle">PQ 空?</text>
  <!-- Yes -->
  <line class="arrow" x1="195" y1="193" x2="245" y2="193"/>
  <text x="220" y="187" text-anchor="middle">是</text>
  <rect class="end" x="245" y="175" width="50" height="36"/>
  <text x="270" y="198" text-anchor="middle" fill="white">输出 ans</text>
  <!-- No -->
  <line class="arrow" x1="150" y1="216" x2="150" y2="241"/>
  <text x="155" y="230" text-anchor="start">否</text>
  <!-- Extract min -->
  <rect class="proc" x="75" y="241" width="150" height="36"/>
  <text x="150" y="255" text-anchor="middle">取出最小 (w,u)</text>
  <text x="150" y="269" text-anchor="middle">若 u 已访问则 continue</text>
  <line class="arrow" x1="150" y1="277" x2="150" y2="302"/>
  <!-- Visit -->
  <rect class="proc" x="75" y="302" width="150" height="36"/>
  <text x="150" y="316" text-anchor="middle">标记 u 已访问, ans += w</text>
  <text x="150" y="330" text-anchor="middle">遍历 u 的邻边, 更新 dist 入 PQ</text>
  <line class="arrow" x1="150" y1="338" x2="150" y2="350"/>
  <!-- Loop back -->
  <path class="arrow" d="M150,350 C150,370 50,370 50,200 C50,100 100,60 150,170" fill="none"/>
</svg>
