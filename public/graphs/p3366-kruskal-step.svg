<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 140">
  <style>
    text { font-family: sans-serif; font-size: 10px; }
    .step { fill: #e3f2fd; stroke: #448aff; stroke-width: 1; rx: 4; }
    .arrow { stroke: #448aff; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    .chosen { fill: #c8e6c9; stroke: #4caf50; stroke-width: 1; rx: 4; }
    .skip { fill: #ffcdd2; stroke: #e53935; stroke-width: 1; rx: 4; }
  </style>
  <defs><marker id="arrowhead" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto"><polygon points="0,0 6,2 0,4" fill="#448aff"/></marker></defs>
  <!-- Step 1 -->
  <rect class="chosen" x="10" y="10" width="100" height="110"/>
  <text x="60" y="30" text-anchor="middle" font-weight="bold">步骤 1</text>
  <text x="60" y="50" text-anchor="middle">边 (1,2) w=1</text>
  <text x="60" y="68" text-anchor="middle">find(1)≠find(2)</text>
  <text x="60" y="86" text-anchor="middle">✓ 加入</text>
  <text x="60" y="104" text-anchor="middle">unite(1,2)</text>
  <!-- Step 2 -->
  <rect class="chosen" x="125" y="10" width="100" height="110"/>
  <text x="175" y="30" text-anchor="middle" font-weight="bold">步骤 2</text>
  <text x="175" y="50" text-anchor="middle">边 (1,3) w=5</text>
  <text x="175" y="68" text-anchor="middle">find(1)≠find(3)</text>
  <text x="175" y="86" text-anchor="middle">✓ 加入</text>
  <text x="175" y="104" text-anchor="middle">unite(1,3)</text>
  <!-- Step 3 -->
  <rect class="skip" x="240" y="10" width="100" height="110"/>
  <text x="290" y="30" text-anchor="middle" font-weight="bold">步骤 3</text>
  <text x="290" y="50" text-anchor="middle">边 (2,4) w=6</text>
  <text x="290" y="68" text-anchor="middle">find(2)=find(4)?</text>
  <text x="290" y="86" text-anchor="middle">find(2)=1, find(4)=4</text>
  <text x="290" y="104" text-anchor="middle">✓ 加入</text>
  <!-- Step 4 -->
  <rect class="skip" x="355" y="10" width="100" height="110"/>
  <text x="405" y="30" text-anchor="middle" font-weight="bold">步骤 4</text>
  <text x="405" y="50" text-anchor="middle">边 (3,4) w=7</text>
  <text x="405" y="68" text-anchor="middle">find(3)=find(4)</text>
  <text x="405" y="86" text-anchor="middle">✗ 成环, 跳过</text>
  <text x="405" y="104" text-anchor="middle">cnt=3=n-1 ✓</text>
  <!-- Arrows -->
  <line class="arrow" x1="115" y1="65" x2="120" y2="65"/>
  <line class="arrow" x1="230" y1="65" x2="235" y2="65"/>
  <line class="arrow" x1="345" y1="65" x2="350" y2="65"/>
</svg>
